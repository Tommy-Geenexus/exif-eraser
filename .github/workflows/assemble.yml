name: Assemble
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      KS_BASE_64: ${{ secrets.KS_BASE_64 }}
      KS_PASSWORD: ${{ secrets.KS_PASSWORD }}
      KS_KEY_ALIAS: ${{ secrets.KS_KEY_ALIAS }}
      KS_KEY_PASSWORD: ${{ secrets.KS_KEY_PASSWORD }}
      APK_NAME: 'app-release.apk'
      APK_PATH: 'app/build/outputs/apk/release/app-release.apk'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup JDK 17
        id: setup-java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: zulu
          java-version: 17

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      # https://github.com/gradle/gradle/issues/29595
      - name: Assemble release
        run: |
          ./gradlew --dependency-verification lenient assembleRelease \
            -DKS_BASE_64=${KS_BASE_64} \
            -DKS_PASSWORD=${KS_PASSWORD} \
            -DKS_KEY_ALIAS=${KS_KEY_ALIAS} \
            -DKS_KEY_PASSWORD=${KS_KEY_PASSWORD}

      - name: Upload apk
        id: upload_apk
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          overwrite: true
          retention-days: 1
