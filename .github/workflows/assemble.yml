name: Assemble
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      KS_BASE_64: ${{ secrets.KS_BASE_64 }}
      KS_PASSWORD: ${{ secrets.KS_PASSWORD }}
      KS_KEY_ALIAS: ${{ secrets.KS_KEY_ALIAS }}
      KS_KEY_PASSWORD: ${{ secrets.KS_KEY_PASSWORD }}
      APK_NAME: 'app-release.apk'
      APK_PATH: 'app/build/outputs/apk/release/app-release.apk'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup JDK 17
        id: setup-java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: zulu
          java-version: 17

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      # https://github.com/gradle/gradle/issues/29595
      - name: Assemble release
        run: |
          ./gradlew --dependency-verification lenient assembleRelease \
            -DKS_BASE_64=${KS_BASE_64} \
            -DKS_PASSWORD=${KS_PASSWORD} \
            -DKS_KEY_ALIAS=${KS_KEY_ALIAS} \
            -DKS_KEY_PASSWORD=${KS_KEY_PASSWORD}

      - name: Upload apk
        id: upload_apk
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          overwrite: true
          retention-days: 1
